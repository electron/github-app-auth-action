name: CI

on:
  schedule:
    - cron: '0 22 * * 3'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20
          cache: yarn
      - name: Install Dependencies
        run: yarn install --immutable
      - name: Check Format
        run: yarn format:check
      - name: Lint
        run: yarn lint
      - name: Test
        run: yarn ci-test

  release:
    name: release
    runs-on: ubuntu-latest
    needs: test-typescript
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write # for making github release
      pull-requests: write # for commenting release version
      issues: write # for commenting release version
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run semantic release
        uses: electron/semantic-trusted-release@03517840010ba30fe5264f4875f4cff066b658d1 # v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
